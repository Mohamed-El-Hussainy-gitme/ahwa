name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify release readiness
        run: npm run verify:release

      - name: Verify operations hardening
        run: npm run verify:operations

      - name: Verify login entry contract
        run: npm run verify:login-entry

      - name: Verify runtime/public freshness
        run: npm run verify:runtime-public-freshness

      - name: Verify phase 30 load lab
        run: npm run verify:phase30

      - name: Build shared
        run: npm run build:shared

      - name: Typecheck web
        run: npm run typecheck:web

      - name: Lint web
        run: npm run lint:web

      - name: Build web
        run: npm run build:web

      - name: Smoke ops health
        if: ${{ env.AHWA_SMOKE_BASE_URL != '' && env.CRON_SECRET != '' }}
        run: npm run smoke:ops:health
        env:
          AHWA_SMOKE_BASE_URL: ${{ secrets.AHWA_SMOKE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
